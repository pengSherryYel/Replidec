name: Test

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      ref:
        description: Git ref to test; defaults to the triggering ref
        required: false
        type: string
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Flake8
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out candidate code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install lint dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run Flake8
        run: python -m flake8 .

  integration:
    name: RepliDec integration
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - name: Check out candidate code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install the current Bioconda package and runtime dependencies
        uses: mamba-org/setup-micromamba@add3a49764cedee8ee24e82dfde87f5bc2914462 # v2.0.7
        with:
          environment-name: replidec-ci
          create-args: >-
            python=3.10
            pip
            replidec
          condarc: |
            channels:
              - conda-forge
              - bioconda
            channel_priority: strict
          cache-downloads: true
          init-shell: bash

      - name: Upgrade RepliDec to the candidate code
        id: candidate
        run: |
          python -m pip install --no-deps --upgrade --force-reinstall .

          PACKAGE_DIR="$(python -c 'from pathlib import Path; import Replidec; print(Path(Replidec.__file__).resolve().parent)')"
          echo "package-dir=${PACKAGE_DIR}" >> "${GITHUB_OUTPUT}"
          echo "database-version=$(python -c 'from Replidec.Replidec import DATABASE_MANIFEST; print(DATABASE_MANIFEST["version"])')" >> "${GITHUB_OUTPUT}"
          echo "database-url=$(python -c 'from Replidec.Replidec import DATABASE_MANIFEST; print(DATABASE_MANIFEST["url"])')" >> "${GITHUB_OUTPUT}"

          python - <<'PY'
          import re
          from pathlib import Path
          import Replidec

          source = Path("Replidec/__init__.py").read_text(encoding="utf-8")
          expected = re.search(r'^__version__\s*=\s*["\x27]([^"\x27]+)["\x27]', source, re.MULTILINE)
          assert expected is not None, "Unable to read the candidate version"

          package_path = Path(Replidec.__file__).resolve()
          print(f"Testing RepliDec {Replidec.__version__} from {package_path}")
          assert Replidec.__version__ == expected.group(1), (
              "Candidate code did not replace the published Bioconda package"
          )
          PY

          Replidec --version
          replidec --version

      - name: Restore the reference database
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ${{ steps.candidate.outputs.package-dir }}/db
          key: replidec-db-${{ runner.os }}-v${{ steps.candidate.outputs.database-version }}

      - name: Download and verify the reference database on a cache miss
        env:
          DATABASE_DIR: ${{ steps.candidate.outputs.package-dir }}/db
          DATABASE_URL: ${{ steps.candidate.outputs.database-url }}
        run: |
          set -euo pipefail

          if [[ -f "${DATABASE_DIR}/md5sum.list" ]] && (
            cd "${DATABASE_DIR}" && md5sum --check --quiet md5sum.list
          ); then
            echo "Using the cached reference database."
          else
            rm -rf "${DATABASE_DIR}"
            archive="${RUNNER_TEMP}/replidec-database.tar.gz"
            curl --fail --location \
              --retry 5 \
              --retry-delay 10 \
              --retry-all-errors \
              --silent \
              --show-error \
              --output "${archive}" \
              "${DATABASE_URL}"
            tar -xzf "${archive}" -C "$(dirname "${DATABASE_DIR}")"
            (
              cd "${DATABASE_DIR}"
              md5sum --check --quiet md5sum.list
            )
          fi

      - name: Run release helper tests
        run: python -m unittest discover -s test -p 'test_*.py' -v

      - name: Run end-to-end tests
        env:
          REPLIDEC_TEST_OUTPUT_DIR: ${{ runner.temp }}/replidec-test-results
        run: bash test/example.sh

      - name: Upload test summaries and external-tool logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: replidec-test-results-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/replidec-test-results/**/prediction_summary.tsv
            ${{ runner.temp }}/replidec-test-results/**/external_tools.log
          if-no-files-found: warn
          retention-days: 14
